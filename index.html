<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mebel Dashboard — PWA</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#5b8def" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter','ui-sans-serif','system-ui'] },
          colors: {
            primary: { DEFAULT: '#5b8def' },
            ink: '#0b1220'
          }
        }
      }
    }
  </script>
  <style>
    html,body{height:100%}
    .glass{backdrop-filter:saturate(180%) blur(12px)}
  </style>
</head>
<body class="font-sans bg-gradient-to-br from-indigo-700 via-violet-700 to-fuchsia-600 min-h-screen text-white/90">
  <div class="min-h-screen flex">
    <!-- Sidebar -->
    <aside class="w-72 hidden md:flex flex-col gap-3 p-5 glass bg-white/10 shadow-xl">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-white/20 grid place-items-center">🪑</div>
        <div>
          <div class="text-lg font-semibold">Mebel Dashboard</div>
          <div class="text-xs text-white/70">PWA · Supabase</div>
        </div>
      </div>
      <nav class="mt-4 flex flex-col gap-2" id="sidebar-nav">
        <button class="nav-btn active">Tovarlar</button>
        <button class="nav-btn">Zakazlar</button>
        <button class="nav-btn">Doimiy mijozlar</button>
        <button class="nav-btn">Mijozlar</button>
      </nav>
      <a href="/admin.html" class="mt-auto text-sm px-3 py-2 rounded-lg bg-white/15 hover:bg-white/20 transition">🔐 Admin</a>
    </aside>

    <!-- Content -->
    <main class="flex-1 p-4 md:p-8">
      <!-- Top bar (mobile) -->
      <div class="md:hidden mb-4 glass bg-white/10 rounded-2xl p-3 flex items-center justify-between">
        <div class="font-semibold">Mebel Dashboard</div>
        <a href="/admin.html" class="text-sm px-3 py-2 rounded-lg bg-white/15">Admin</a>
      </div>

      <!-- Tabs (mobile) -->
      <div class="md:hidden grid grid-cols-2 gap-2 mb-4" id="mobile-tabs">
        <button class="tab-btn active">Tovarlar</button>
        <button class="tab-btn">Zakazlar</button>
        <button class="tab-btn">Doimiy mijozlar</button>
        <button class="tab-btn">Mijozlar</button>
      </div>

      <!-- Sections -->
      <section class="section card" data-section="0">
        <header class="flex items-center justify-between mb-4">
          <h2 class="text-xl md:text-2xl font-semibold">Tovarlar</h2>
        </header>
        <form id="product-form" class="grid md:grid-cols-6 gap-2 md:gap-3">
          <input name="type" placeholder="Tovar turi" required class="input" />
          <input name="model" placeholder="Model/nomer" class="input" />
          <input name="purchase_price" placeholder="Olingan narx" type="number" class="input" />
          <input name="paid_amount" placeholder="Berilgan pul" type="number" class="input" />
          <input name="quantity" placeholder="Qolgan miqdor" type="number" class="input" />
          <input name="delivery_date" type="date" class="input" />
          <button class="btn col-span-full md:col-span-1">Qo'shish</button>
        </form>
        <div class="table-wrap mt-4" id="products-table"></div>
        <div class="totals mt-3 text-sm text-white/90" id="products-totals"></div>
      </section>

      <section class="section card hidden" data-section="1">
        <header class="flex items-center justify-between mb-4">
          <h2 class="text-xl md:text-2xl font-semibold">Zakazlar</h2>
        </header>
        <form id="order-form" class="grid md:grid-cols-6 gap-2 md:gap-3">
          <input name="customer_name" placeholder="Mijoz nomi" required class="input" />
          <input name="product_type" placeholder="Tovar turi" required class="input" />
          <input name="model" placeholder="Model/nomer" class="input" />
          <input name="quantity" placeholder="Qancha oldi" type="number" class="input" />
          <input name="paid_amount" placeholder="Qancha berdi" type="number" class="input" />
          <input name="delivery_date" type="date" class="input" />
          <button class="btn col-span-full md:col-span-1">Qo'shish</button>
        </form>
        <div class="table-wrap mt-4" id="orders-table"></div>
        <div class="totals mt-3 text-sm text-white/90" id="orders-totals"></div>
      </section>

      <section class="section card hidden" data-section="2">
        <header class="flex items-center justify-between mb-4">
          <h2 class="text-xl md:text-2xl font-semibold">Doimiy mijozlar</h2>
        </header>
        <form id="regular-form" class="grid md:grid-cols-5 gap-2 md:gap-3">
          <input name="name" placeholder="Mijoz nomi" required class="input" />
          <input name="brought_quantity" placeholder="Olib kelgan tovar" type="number" class="input" />
          <input name="tape_used" placeholder="Lenta urilgan" type="number" class="input" />
          <input name="paid_amount" placeholder="Berilgan pul" type="number" class="input" />
          <input name="remaining_amount" placeholder="Qolgan pul" type="number" class="input" />
          <button class="btn col-span-full md:col-span-1">Qo'shish</button>
        </form>
        <div class="table-wrap mt-4" id="regular-table"></div>
        <div class="totals mt-3 text-sm text-white/90" id="regular-totals"></div>
      </section>

      <section class="section card hidden" data-section="3">
        <header class="flex items-center justify-between mb-4">
          <h2 class="text-xl md:text-2xl font-semibold">Mijozlar</h2>
        </header>
        <form id="client-form" class="grid md:grid-cols-5 gap-2 md:gap-3">
          <input name="name" placeholder="Mijoz nomi" required class="input" />
          <input name="brought_quantity" placeholder="Olib kelgan tovar" type="number" class="input" />
          <input name="tape_used" placeholder="Lenta urilgan" type="number" class="input" />
          <input name="paid_amount" placeholder="Berilgan pul" type="number" class="input" />
          <input name="remaining_amount" placeholder="Qolgan pul" type="number" class="input" />
          <button class="btn col-span-full md:col-span-1">Qo'shish</button>
        </form>
        <div class="table-wrap mt-4" id="clients-table"></div>
        <div class="totals mt-3 text-sm text-white/90" id="clients-totals"></div>
      </section>

      <div class="mt-6 flex gap-3 items-center">
        <button id="btn-ask-permission" class="px-3 py-2 rounded-lg bg-white/15 hover:bg-white/25">🔔 Bildirishnomani yoqish</button>
        <span id="perm-status" class="text-sm text-white/80"></span>
      </div>

      <div id="toast" class="fixed right-4 bottom-4 hidden px-3 py-2 rounded-lg bg-black/80 text-white text-sm"></div>
    </main>
  </div>

  <script type="module" src="/main.js"></script>

  <style>
    .card{background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.16); border-radius:16px; padding:16px}
    .input{background:rgba(255,255,255,0.2); border:1px solid rgba(255,255,255,0.25); border-radius:12px; padding:10px; outline:none}
    .input:focus{border-color:#fff; box-shadow:0 0 0 3px rgba(255,255,255,0.2)}
    .btn{background:#5b8def; color:white; font-weight:600; padding:10px 14px; border-radius:12px}
    .btn:hover{filter:brightness(1.05)}
    .nav-btn, .tab-btn{text-align:left; padding:10px 12px; border-radius:10px; background:rgba(255,255,255,0.08)}
    .nav-btn.active, .tab-btn.active{background:#5b8def; color:white; font-weight:600}
    .table-wrap{background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.16); border-radius:12px; padding:8px; overflow:auto}
    table{width:100%; min-width:720px}
    th,td{white-space:nowrap; padding:10px; border-bottom:1px solid rgba(255,255,255,0.12)}
    thead tr th{position:sticky; top:0; background:rgba(15,15,25,0.35); backdrop-filter:blur(6px)}
  </style>
</body>
</html>
